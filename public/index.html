<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💕 Lovers Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0010 0%, #2d0022 40%, #1a0010 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Floating hearts background */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .heart-float {
      position: absolute;
      bottom: -60px;
      font-size: 1.5rem;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-15deg); opacity: 0.6; }
      100% { transform: translateY(-110vh) rotate(15deg); opacity: 0; }
    }

    /* ── Join Screen ── */
    #join-screen {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255, 100, 150, 0.3);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 60px rgba(255, 50, 100, 0.25), 0 8px 32px rgba(0,0,0,0.4);
    }

    .app-title {
      font-size: 2rem;
      color: #ff6b9d;
      margin-bottom: 6px;
      text-shadow: 0 0 20px rgba(255, 107, 157, 0.6);
      letter-spacing: 1px;
    }
    .app-subtitle {
      color: rgba(255,200,220,0.6);
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,180,200,0.7);
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255, 100, 150, 0.35);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 20px;
    }
    input[type="text"]:focus {
      border-color: #ff6b9d;
      box-shadow: 0 0 12px rgba(255, 107, 157, 0.4);
    }
    input[type="text"]::placeholder { color: rgba(255,200,220,0.3); }

    #code-input {
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ff6b9d, #c4426b);
      color: #fff;
      box-shadow: 0 4px 20px rgba(255, 107, 157, 0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(255, 107, 157, 0.6);
    }
    .btn-primary:active { transform: translateY(0); }

    #error-msg {
      margin-top: 16px;
      color: #ff6b6b;
      font-size: 0.85rem;
      min-height: 20px;
    }

    /* ── Waiting Screen ── */
    #waiting-screen {
      display: none;
      position: relative;
      z-index: 1;
      text-align: center;
      color: #fff;
    }
    .pulse-heart {
      font-size: 5rem;
      animation: heartbeat 1.2s ease-in-out infinite;
      display: block;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      30%       { transform: scale(1.25); }
      60%       { transform: scale(1.1); }
    }
    .waiting-text {
      margin-top: 24px;
      font-size: 1.1rem;
      color: rgba(255,200,220,0.8);
    }
    .room-code-display {
      display: inline-block;
      margin-top: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,107,157,0.4);
      border-radius: 12px;
      padding: 10px 24px;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 6px;
      color: #ff6b9d;
      text-shadow: 0 0 16px rgba(255,107,157,0.5);
    }
    .waiting-hint {
      margin-top: 16px;
      font-size: 0.8rem;
      color: rgba(255,200,220,0.4);
    }

    /* ── Chat Screen ── */
    #chat-screen {
      display: none;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      height: 100vh;
      max-height: 700px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255, 100, 150, 0.25);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 60px rgba(255, 50, 100, 0.2), 0 8px 32px rgba(0,0,0,0.4);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 18px 20px;
      background: rgba(255, 107, 157, 0.12);
      border-bottom: 1px solid rgba(255, 107, 157, 0.2);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header-heart { font-size: 1.4rem; }
    .chat-header-info { flex: 1; }
    .partner-name {
      font-size: 1rem;
      font-weight: 700;
      color: #ff6b9d;
    }
    .partner-status {
      font-size: 0.75rem;
      color: rgba(255,200,220,0.5);
    }
    .online-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      display: inline-block;
      margin-right: 5px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,107,157,0.3); border-radius: 2px; }

    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 75%;
    }
    .msg-row.mine { align-self: flex-end; align-items: flex-end; }
    .msg-row.theirs { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .mine .msg-bubble {
      background: linear-gradient(135deg, #c4426b, #ff6b9d);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .theirs .msg-bubble {
      background: rgba(255,255,255,0.1);
      color: #ffe0ec;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255,107,157,0.2);
    }

    .msg-meta {
      font-size: 0.7rem;
      color: rgba(255,200,220,0.35);
      margin-top: 3px;
      padding: 0 4px;
    }

    .system-msg {
      text-align: center;
      font-size: 0.78rem;
      color: rgba(255,200,220,0.4);
      font-style: italic;
      padding: 4px 0;
    }

    #typing-indicator {
      padding: 0 20px 8px;
      font-size: 0.78rem;
      color: rgba(255, 107, 157, 0.6);
      min-height: 22px;
      font-style: italic;
    }
    .typing-dots::after {
      content: '...';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots {
      0%, 100% { content: '.'; }
      33%       { content: '..'; }
      66%       { content: '...'; }
    }

    .chat-input-area {
      padding: 14px 16px;
      border-top: 1px solid rgba(255, 107, 157, 0.15);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #msg-input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255, 100, 150, 0.3);
      border-radius: 24px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      height: 44px;
      line-height: 1.4;
      overflow: hidden;
      margin: 0;
    }
    #msg-input:focus { border-color: #ff6b9d; }
    #msg-input::placeholder { color: rgba(255,200,220,0.3); }

    #send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #ff6b9d, #c4426b);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(255,107,157,0.4);
    }
    #send-btn:hover { transform: scale(1.1); box-shadow: 0 4px 18px rgba(255,107,157,0.6); }
    #send-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <!-- Floating hearts -->
  <div class="hearts-bg" id="hearts-bg"></div>

  <!-- Join Screen -->
  <div id="join-screen">
    <div class="app-title">💕 Lovers Chat</div>
    <p class="app-subtitle">Share a secret code to connect with your person</p>

    <label for="name-input">Your name</label>
    <input type="text" id="name-input" placeholder="e.g. Rose" maxlength="30" autocomplete="off" />

    <label for="code-input">Secret code</label>
    <input type="text" id="code-input" placeholder="e.g. FOREVER" maxlength="12" autocomplete="off" />

    <button class="btn btn-primary" id="join-btn">Connect 💖</button>
    <div id="error-msg"></div>
  </div>

  <!-- Waiting Screen -->
  <div id="waiting-screen">
    <span class="pulse-heart">💗</span>
    <div class="waiting-text">Waiting for your love to join…</div>
    <div class="room-code-display" id="waiting-code-display"></div>
    <div class="waiting-hint">Share this code with your partner</div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen">
    <div class="chat-header">
      <span class="chat-header-heart">💌</span>
      <div class="chat-header-info">
        <div class="partner-name" id="chat-partner-name"></div>
        <div class="partner-status"><span class="online-dot"></span>Connected</div>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div id="typing-indicator"></div>
    <div class="chat-input-area">
      <input type="text" id="msg-input" placeholder="Say something sweet… 💬" maxlength="500" autocomplete="off" />
      <button id="send-btn">➤</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ── Floating hearts ──────────────────────────────
    const heartsContainer = document.getElementById('hearts-bg');
    const HEART_EMOJIS = ['💕','💗','💓','💞','❤️','🌸','✨'];
    function spawnHeart() {
      const el = document.createElement('span');
      el.classList.add('heart-float');
      el.textContent = HEART_EMOJIS[Math.floor(Math.random() * HEART_EMOJIS.length)];
      el.style.left = Math.random() * 100 + 'vw';
      const dur = 6 + Math.random() * 8;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = Math.random() * 4 + 's';
      el.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
      heartsContainer.appendChild(el);
      setTimeout(() => el.remove(), (dur + 4) * 1000);
    }
    setInterval(spawnHeart, 600);
    for (let i = 0; i < 8; i++) spawnHeart();

    // ── UI helpers ───────────────────────────────────
    const joinScreen    = document.getElementById('join-screen');
    const waitingScreen = document.getElementById('waiting-screen');
    const chatScreen    = document.getElementById('chat-screen');

    function showScreen(name) {
      joinScreen.style.display    = name === 'join'    ? '' : 'none';
      waitingScreen.style.display = name === 'waiting' ? 'block' : 'none';
      chatScreen.style.display    = name === 'chat'    ? 'flex' : 'none';
    }
    showScreen('join');

    // ── Socket ───────────────────────────────────────
    const socket = io();

    let myName = '';

    const joinBtn    = document.getElementById('join-btn');
    const nameInput  = document.getElementById('name-input');
    const codeInput  = document.getElementById('code-input');
    const errorMsg   = document.getElementById('error-msg');

    codeInput.addEventListener('input', () => {
      codeInput.value = codeInput.value.toUpperCase();
    });

    joinBtn.addEventListener('click', tryJoin);
    nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') codeInput.focus(); });
    codeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryJoin(); });

    function tryJoin() {
      const name = nameInput.value.trim();
      const code = codeInput.value.trim();
      if (!name) { showError('Please enter your name 💕'); return; }
      if (!code || code.length < 2) { showError('Enter a secret code (at least 2 characters)'); return; }
      myName = name;
      errorMsg.textContent = '';
      socket.emit('join', { code, name });
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      setTimeout(() => { errorMsg.textContent = ''; }, 3000);
    }

    socket.on('room-full', () => {
      showError('This code is already taken by another couple 💔');
    });

    socket.on('waiting', () => {
      document.getElementById('waiting-code-display').textContent =
        codeInput.value.trim().toUpperCase();
      showScreen('waiting');
    });

    socket.on('matched', ({ partnerName }) => {
      document.getElementById('chat-partner-name').textContent = partnerName;
      showScreen('chat');
      addSystemMsg('💕 You are now connected with ' + partnerName);
      document.getElementById('msg-input').focus();
    });

    // ── Messaging ────────────────────────────────────
    const messagesEl     = document.getElementById('chat-messages');
    const msgInput       = document.getElementById('msg-input');
    const sendBtn        = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    let typingTimeout;
    msgInput.addEventListener('input', () => {
      socket.emit('typing');
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => socket.emit('stop-typing'), 1500);
    });

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;
      socket.emit('message', { text });
      msgInput.value = '';
      socket.emit('stop-typing');
      clearTimeout(typingTimeout);
    }

    socket.on('message', ({ from, text, timestamp, socketId }) => {
      const isMine = socketId === socket.id;
      const row = document.createElement('div');
      row.classList.add('msg-row', isMine ? 'mine' : 'theirs');

      const bubble = document.createElement('div');
      bubble.classList.add('msg-bubble');
      bubble.textContent = text;

      const meta = document.createElement('div');
      meta.classList.add('msg-meta');
      meta.textContent = timestamp;

      row.appendChild(bubble);
      row.appendChild(meta);
      messagesEl.appendChild(row);
      scrollToBottom();
    });

    socket.on('typing', ({ name }) => {
      typingIndicator.innerHTML = `<span class="typing-dots">${name} is typing</span>`;
    });
    socket.on('stop-typing', () => {
      typingIndicator.innerHTML = '';
    });

    socket.on('partner-left', () => {
      addSystemMsg('💔 Your partner has disconnected…');
      document.querySelector('.partner-status').innerHTML = '❌ Disconnected';
      document.querySelector('.online-dot').style.display = 'none';
    });

    function addSystemMsg(text) {
      const el = document.createElement('div');
      el.classList.add('system-msg');
      el.textContent = text;
      messagesEl.appendChild(el);
      scrollToBottom();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  </script>
</body>
</html>
